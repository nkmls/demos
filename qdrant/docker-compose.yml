version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest          # toimii ARM64:llä
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST + gRPC API (tämä riittää n8n:lle)
      - "6334:6334"   # gRPC (suositus n8n:lle)
    volumes:
      - ./data:/qdrant/storage          # pysyvä tallennus
    environment:
      - QDRANT__SERVICE__API_KEY=    # ← tähän salasana
      - QDRANT__SERVICE__GRPC_PORT=6334

