<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liity jäseneksi – Kontiolahden Työttömät ry</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-teal-50 min-h-screen py-12 px-4">
  <div class="max-w-lg mx-auto">
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-emerald-100">
      
      <!-- Header -->
      <div class="bg-gradient-to-r from-emerald-700 to-teal-600 px-8 py-8 text-white text-center">
        <div class="flex justify-center mb-3">
          <div class="w-16 h-16 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center text-3xl">🌳</div>
        </div>
        <h1 class="text-2xl font-semibold tracking-tight">Kontiolahden Työttömät ry</h1>
        <p class="text-emerald-100 mt-1">30-vuotisjuhlavuosi 2026</p>
        <h2 class="text-xl mt-6 font-medium">Liity jäseneksi ja/tai tilaa uutiskirje</h2>
      </div>

      <!-- Lomake -->
      <form id="jasenForm" class="px-8 pt-8 pb-10 space-y-6">
        
        <!-- Valinnat -->
        <div class="space-y-4">
          <label class="block text-sm font-medium text-gray-700 mb-2">Mitä haluat? *</label>
          
          <div class="flex items-center gap-3">
            <input type="checkbox" id="jasen" class="w-5 h-5 accent-emerald-600">
            <label for="jasen" class="text-gray-700">Haluan liittyä jäseneksi</label>
          </div>
          
          <div class="flex items-center gap-3">
            <input type="checkbox" id="kirje" class="w-5 h-5 accent-emerald-600">
            <label for="kirje" class="text-gray-700">Haluan vastaanottaa jäsenkirjeen</label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nimi *</label>
          <input type="text" id="nimi" required
                 class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Sähköposti *</label>
          <input type="email" id="email" required
                 class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Puhelin (vapaaehtoinen)</label>
          <input type="tel" id="puhelin"
                 class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Miksi haluat liittyä tai mitä odotat uutiskirjeeltä? (vapaaehtoinen)</label>
          <textarea id="kommentti" rows="3"
                    class="w-full px-4 py-3 border border-gray-200 rounded-3xl focus:outline-none focus:border-emerald-500 resize-y"></textarea>
        </div>

        <!-- Suostumus -->
        <div class="flex items-start gap-3">
          <input type="checkbox" id="suostumus" required class="mt-1 w-5 h-5 accent-emerald-600">
          <label for="suostumus" class="text-sm text-gray-600 leading-tight">
            Hyväksyn tietojeni käsittelyn jäsenrekisteriin ja uutiskirjeen lähettämiseen.<br>
            <span class="text-xs text-gray-500">Voit perua tilauksen milloin tahansa.</span>
          </label>
        </div>

        <button type="submit" id="submitBtn"
                class="w-full bg-emerald-600 hover:bg-emerald-700 transition-colors text-white font-medium py-4 rounded-3xl text-lg shadow-md">
          <span id="btnText">Lähetä</span>
        </button>
      </form>

      <!-- Onnistumisviesti -->
      <div id="successMessage" class="hidden px-8 py-12 text-center">
        <div class="text-6xl mb-6">🌳</div>
        <h3 class="text-2xl font-semibold text-emerald-800">Kiitos!</h3>
        <p class="mt-3 text-emerald-700">Tervetuloa mukaan yhteisöömme!</p>
        <p id="grokViesti" class="mt-6 text-gray-600 italic"></p>
        <button onclick="window.location.reload()" class="mt-8 text-emerald-600 hover:text-emerald-700 font-medium">
          Lähetä uusi lomake →
        </button>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('jasenForm');
    const success = document.getElementById('successMessage');
    const grokViesti = document.getElementById('grokViesti');
    const btnText = document.getElementById('btnText');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const jasenChecked = document.getElementById('jasen').checked;
      const kirjeChecked = document.getElementById('kirje').checked;

      if (!jasenChecked && !kirjeChecked) {
        alert('Valitse ainakin yksi vaihtoehto: jäsenyys tai jäsenkirje.');
        return;
      }

      btnText.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>`;

      const data = {
        nimi: document.getElementById('nimi').value.trim(),
        email: document.getElementById('email').value.trim(),
        puhelin: document.getElementById('puhelin').value.trim(),
        kommentti: document.getElementById('kommentti').value.trim(),
        
        // ← TÄRKEÄ MUUTOS: nyt string-muodossa
        haluan_jaseneksi: jasenChecked ? "true" : "false",
        haluan_jasenkirjeen: kirjeChecked ? "true" : "false",
        
        suostumus: true,
        source: "WordPress-jasenlomake"
      };

      try {
        const response = await fetch('https://n8n.kontiolahdentyottomat.fi/webhook-test/8672d409-cc61-4460-88bc-ce04ad0cc5c2', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          form.classList.add('hidden');
          success.classList.remove('hidden');
          grokViesti.innerHTML = `Tervetuloa mukaan!<br>Olet nyt osa Kontiolahden Työttömiä.`;
        } else {
          alert('Jotain meni pieleen. Kokeile uudelleen.');
        }
      } catch (err) {
        alert('Yhteysvirhe. Tarkista verkkoyhteys.');
      } finally {
        btnText.textContent = 'Lähetä';
      }
    });
  </script>
</body>
</html>
