<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌦️ Global Weather Station - 3D Globe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #0c0c1a 0%, #1a1a3a 50%, #0c0c1a 100%);
      font-family: 'Segoe UI', -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }
    
    /* Background particles */
    .bg-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    
    .particle {
      position: absolute;
      background: rgba(0, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 20s infinite linear;
    }
    
    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }
    
    /* Globe Container */
    #globe-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }
    
    /* Control Panel */
    #control-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 25px;
      max-width: 350px;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .panel-header {
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      background: linear-gradient(135deg, #00d4ff, #5a67d8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .city-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
      max-height: 300px;
      overflow-y: auto;
    }
    
    .city-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #ffffff;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .city-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: #00d4ff;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
      transform: translateY(-2px);
    }
    
    .city-btn.active {
      background: linear-gradient(135deg, #00d4ff, #5a67d8);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
      border-color: #00d4ff;
    }
    
    /* Weather Window */
    .weather-window {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 30px;
      padding: 40px;
      min-width: 420px;
      max-width: 480px;
      box-shadow: 0 35px 60px rgba(0, 0, 0, 0.4);
      display: none;
      z-index: 1000;
      animation: modalSlideIn 0.4s ease-out;
    }
    
    @keyframes modalSlideIn {
      from { opacity: 0; transform: translate(-50%, -60%) scale(0.95); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    
    .backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      z-index: 999;
      display: none;
    }
    
    .window-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    .city-name {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .close-btn, .center-btn {
      background: rgba(255, 68, 68, 0.2);
      border: none;
      color: #ff6b6b;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      margin-left: 10px;
    }
    
    .center-btn {
      background: rgba(0, 212, 255, 0.2);
      color: #00d4ff;
    }
    
    .close-btn:hover { background: rgba(255, 68, 68, 0.4); color: #fff; transform: scale(1.1); }
    .center-btn:hover { background: rgba(0, 212, 255, 0.4); color: #fff; transform: scale(1.1); }
    
    .temp-display { text-align: center; margin: 30px 0; }
    .current-temp {
      font-size: 72px;
      font-weight: 300;
      color: #ffffff;
      text-shadow: 0 0 40px currentColor;
      margin-bottom: 15px;
      letter-spacing: -2px;
    }
    
    .weather-icon { font-size: 56px; margin: 20px 0; }
    
    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 30px 0;
    }
    
    .data-item {
      text-align: center;
      padding: 20px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      transition: all 0.3s ease;
    }
    
    .data-item:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); }
    
    .data-label { font-size: 13px; color: #a0aec0; margin-bottom: 8px; font-weight: 500; }
    .data-value { font-size: 20px; font-weight: 600; color: #ffffff; }
    
    .last-updated {
      text-align: center;
      font-size: 13px;
      color: #718096;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    /* Loading */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      color: white;
    }
    
    .loading-spinner {
      width: 70px;
      height: 70px;
      border: 4px solid rgba(0, 212, 255, 0.3);
      border-top: 4px solid #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 25px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <!-- Background Particles -->
  <div class="bg-particles" id="particles"></div>
  
  <!-- Loading Screen -->
  <div id="loading">
    <div class="loading-spinner"></div>
    <div style="font-size: 20px; margin-bottom: 10px;">Initializing Weather Station...</div>
    <div style="font-size: 14px; opacity: 0.8;">Loading 3D Earth Globe</div>
  </div>

  <!-- Backdrop -->
  <div class="backdrop" id="backdrop" onclick="closeWeatherWindow()"></div>

  <!-- Globe Container -->
  <div id="globe-container">
    <div id="globeViz" style="width: 100%; height: 100%;"></div>
    <canvas id="canvas-globe" style="display: none; width: 100%; height: 100%;"></canvas>
  </div>

  <!-- Control Panel -->
  <div id="control-panel">
    <div class="panel-header">🌍 Weather Globe</div>
    <div style="margin-bottom: 15px; color: #a0aec0; font-size: 12px; text-align: center;">
      Click cities or globe markers
    </div>
    <div class="city-grid" id="city-grid"></div>
    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); text-align: center;">
      <div style="font-size: 11px; color: #718096;">Auto-refresh: 5min</div>
      <div id="global-status" style="font-size: 11px; color: #48bb78; margin-top: 5px;">🔄 Loading...</div>
    </div>
  </div>

  <!-- Weather Window -->
  <div id="weather-window" class="weather-window">
    <div class="window-header">
      <div class="city-name" id="window-city-name">Loading...</div>
      <button class="center-btn" title="Center Globe" onclick="centerGlobeOnActiveCity()">🎯</button>
      <button class="close-btn" onclick="closeWeatherWindow()">×</button>
    </div>
    <div class="temp-display">
      <div class="current-temp" id="window-temp">--°</div>
      <div class="weather-icon" id="window-icon">🌤️</div>
    </div>
    <div class="data-grid">
      <div class="data-item">
        <div class="data-label">Wind</div>
        <div class="data-value" id="window-wind">-</div>
      </div>
      <div class="data-item">
        <div class="data-label">Humidity</div>
        <div class="data-value" id="window-humidity">-</div>
      </div>
      <div class="data-item">
        <div class="data-label">Pressure</div>
        <div class="data-value" id="window-pressure">-</div>
      </div>
      <div class="data-item">
        <div class="data-label">Visibility</div>
        <div class="data-value" id="window-visibility">-</div>
      </div>
    </div>
    <div class="last-updated" id="window-updated"></div>
  </div>

  <script>
    const cities = [
      { name: 'New York', lat: 40.7128, lng: -74.0060, emoji: '🇺🇸', size: 0.4 },
      { name: 'London', lat: 51.5074, lng: -0.1278, emoji: '🇬🇧', size: 0.35 },
      { name: 'Tokyo', lat: 35.6762, lng: 139.6503, emoji: '🇯🇵', size: 0.4 },
      { name: 'Sydney', lat: -33.8688, lng: 151.2093, emoji: '🇦🇺', size: 0.35 },
      { name: 'Paris', lat: 48.8566, lng: 2.3522, emoji: '🇫🇷', size: 0.35 },
      { name: 'Moscow', lat: 55.7558, lng: 37.6173, emoji: '🇷🇺', size: 0.35 },
      { name: 'Dubai', lat: 25.2048, lng: 55.2708, emoji: '🇦🇪', size: 0.3 },
      { name: 'São Paulo', lat: -23.5505, lng: -46.6333, emoji: '🇧🇷', size: 0.35 },
      { name: 'Mumbai', lat: 19.0760, lng: 72.8777, emoji: '🇮🇳', size: 0.35 },
      { name: 'Toronto', lat: 43.6532, lng: -79.3832, emoji: '🇨🇦', size: 0.3 },
      { name: 'Helsinki', lat: 60.1699, lng: 24.9384, emoji: '🇫🇮', size: 0.25 },
      { name: 'Singapore', lat: 1.3521, lng: 103.8198, emoji: '🇸🇬', size: 0.3 }
    ];

    let globe = null;
    let canvasCtx = null;
    let currentCityData = {};
    let activeCity = null;
    let isGlobeReady = false;
    let rotationY = 0;
    let targetRotationY = 0;
    let animationId = null;

    // Create particles
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 60; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.width = particle.style.height = (Math.random() * 4 + 1) + 'px';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
        container.appendChild(particle);
      }
    }

    // ✅ ULTRA-SAFE 3D GLOBE INIT - NO pointStroke
    function initGlobe() {
      try {
        console.log('🔄 Initializing 3D Globe...');
        
        if (typeof Globe === 'undefined') {
          console.log('❌ Globe.gl not loaded - using canvas fallback');
          initCanvasGlobe();
          return;
        }

        const container = document.getElementById('globeViz');
        
        globe = new Globe(container);
        
        // ✅ SAFE METHOD CALLS - NO pointStroke
        globe.globeImageUrl('https://unpkg.com/three-globe@2.44.1/example/img/earth-blue-marble.jpg');
        globe.bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png');
        globe.backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png');
        globe.showGraticules(true);
        
        globe.pointsData(cities);
        globe.pointAltitude('size');
        globe.pointRadius(0.3);
        globe.pointColor('#00d4ff');
        globe.enablePointerInteraction(true);
        globe.onPointClick(onCityClick);

        // Controls
        const controls = globe.controls();
        if (controls) {
          controls.autoRotate = true;
          controls.autoRotateSpeed = 0.5;
        }

        isGlobeReady = true;
        document.getElementById('global-status').textContent = '✅ 3D Globe Ready';
        console.log('✅ 3D Globe SUCCESS!');
        
      } catch (error) {
        console.error('❌ 3D Globe failed:', error);
        initCanvasGlobe();
      }
    }

    // 🌍 ULTIMATE 3D CANVAS GLOBE WITH GLOWING MARKERS
    function initCanvasGlobe() {
      const canvas = document.getElementById('canvas-globe');
      const container = document.getElementById('globeViz');
      canvas.width = container.clientWidth * 2; // HiDPI
      canvas.height = container.clientHeight * 2;
      canvas.style.display = 'block';
      canvasCtx = canvas.getContext('2d');
      
      document.getElementById('global-status').textContent = '🌍 3D Canvas Globe';
      console.log('✅ 3D Canvas Globe Active - WITH GLOWING MARKERS!');
      
      let time = 0;
      
      function draw3DGlobe() {
        const width = canvas.width;
        const height = canvas.height;
        const ctx = canvasCtx;
        ctx.clearRect(0, 0, width, height);
        
        // Smooth rotation to target
        rotationY += (targetRotationY - rotationY) * 0.05;
        
        // Space background with stars
        const bgGradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
        bgGradient.addColorStop(0, '#0a0a2e');
        bgGradient.addColorStop(0.7, '#1a1a4a');
        bgGradient.addColorStop(1, '#000');
        ctx.fillStyle = bgGradient;
        ctx.fillRect(0, 0, width, height);
        
        // Animated twinkling stars
        ctx.fillStyle = '#ffffff';
        for (let i = 0; i < 300; i++) {
          const x = ((i * 137.5 + time * 0.1) % width);
          const y = ((i * 237.5 + time * 0.05) % height);
          const size = (Math.random() * 1.5) + 0.5;
          const brightness = Math.sin(time * 0.002 + i * 0.1) * 0.5 + 0.5;
          ctx.globalAlpha = brightness * 0.9;
          ctx.beginPath();
          ctx.arc(x, y, size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        
        ctx.save();
        ctx.translate(width/2, height/2);
        ctx.scale(0.5, 0.5); // HiDPI scaling
        ctx.rotate(rotationY);
        
        const globeRadius = Math.min(width, height) * 0.3;
        const distance = 800;
        
        // Draw 3D sphere surface (optimized)
        ctx.fillStyle = '#1e3a8a';
        ctx.beginPath();
        ctx.arc(0, 0, globeRadius, 0, Math.PI * 2);
        ctx.fill();
        
        // Dynamic lighting overlay
        const lightAngle = time * 0.0008;
        const lightX = Math.cos(lightAngle) * 1.5;
        const lightY = Math.sin(lightAngle) * 1.5;
        
        const lightGradient = ctx.createRadialGradient(
          lightX * globeRadius * 0.7, lightY * globeRadius * 0.7, 0,
          lightX * globeRadius * 0.7, lightY * globeRadius * 0.7, globeRadius * 1.5
        );
        lightGradient.addColorStop(0, 'rgba(255, 255, 200, 0.6)');
        lightGradient.addColorStop(0.5, 'rgba(100, 150, 255, 0.3)');
        lightGradient.addColorStop(1, 'rgba(30, 58, 138, 0)');
        ctx.fillStyle = lightGradient;
        ctx.beginPath();
        ctx.arc(0, 0, globeRadius, 0, Math.PI * 2);
        ctx.fill();
        
        // 🌟 GLOWING 3D CITY MARKERS
        cities.forEach(city => {
          const phi = (90 - city.lat) * Math.PI / 180;
          const theta = city.lng * Math.PI / 180;
          
          const x = globeRadius * Math.sin(phi) * Math.cos(theta);
          const y = globeRadius * Math.sin(phi) * Math.sin(theta);
          const z = globeRadius * Math.cos(phi);
          
          // 3D Perspective projection
          const scale = distance / (distance + z);
          const projX = x * scale;
          const projY = y * scale;
          const projRadius = 8 * scale * city.size;
          
          if (projX * projX + projY * projY < globeRadius * globeRadius) {
            // 💚 GLOWING ACTIVE CITY
            if (activeCity?.name === city.name) {
              // Multiple glow rings
              for (let glow = 0; glow < 3; glow++) {
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 40 - glow * 10;
                ctx.fillStyle = `rgba(0, 255, 136, ${0.8 - glow * 0.2})`;
                ctx.beginPath();
                ctx.arc(projX, projY, projRadius + glow * 8, 0, Math.PI * 2);
                ctx.fill();
              }
              ctx.shadowBlur = 0;
              
              // Bright core
              ctx.fillStyle = '#00ff88';
              ctx.strokeStyle = '#ffffff';
              ctx.lineWidth = 3 * scale;
            } else {
              // Normal city marker
              ctx.shadowColor = '#00d4ff';
              ctx.shadowBlur = 15;
              ctx.fillStyle = '#00d4ff';
              ctx.strokeStyle = '#ffffff';
              ctx.lineWidth = 2 * scale;
            }
            
            // Main marker circle
            ctx.beginPath();
            ctx.arc(projX, projY, projRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            // Pulsing animation for active city
            if (activeCity?.name === city.name) {
              const pulse = Math.sin(time * 0.01) * 0.5 + 0.5;
              ctx.shadowColor = '#ffffff';
              ctx.shadowBlur = 20 * pulse;
              ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
              ctx.beginPath();
              ctx.arc(projX, projY, projRadius * 1.5, 0, Math.PI * 2);
              ctx.fill();
              ctx.shadowBlur = 0;
            }
            
            // City emoji label
            ctx.fillStyle = '#ffffff';
            ctx.font = `${Math.max(12 * scale, 8)}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(city.emoji, projX, projY - 35 * scale);
          }
        });
        
        // Globe atmosphere glow
        ctx.shadowColor = '#00d4ff';
        ctx.shadowBlur = 60;
        ctx.strokeStyle = 'rgba(0, 212, 255, 0.4)';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.arc(0, 0, globeRadius * 1.05, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;
        
        ctx.restore();
        time++;
        animationId = requestAnimationFrame(draw3DGlobe);
      }
      
      // 🖱️ ENHANCED CLICK DETECTION
      canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        const x = ((e.clientX - rect.left) * scaleX / canvas.width * 2 - 1) * 0.5;
        const y = (1 - (e.clientY - rect.top) * scaleY / canvas.height * 2) * 0.5;
        
        // Check cities with rotation compensation
        cities.forEach(city => {
          const phi = (90 - city.lat) * Math.PI / 180;
          const theta = (city.lng * Math.PI / 180) + rotationY;
          
          const globeX = Math.sin(phi) * Math.cos(theta);
          const globeY = Math.sin(phi) * Math.sin(theta);
          
          if (Math.hypot(x - globeX, y - globeY) < 0.08) {
            console.log('🎯 Clicked:', city.name);
            onCityClick(city);
          }
        });
      });
      
      // Mouse interaction
      canvas.addEventListener('mousemove', (e) => {
        if (e.buttons === 1) { // Dragging
          targetRotationY += e.movementX * 0.01;
        }
      });
      
      draw3DGlobe();
    }

    function onCityClick(cityData) {
      const city = typeof cityData === 'object' ? cityData : 
        cities.find(c => c.name === cityData.name || 
          (Math.abs(c.lat - cityData.lat) < 1 && Math.abs(c.lng - cityData.lng) < 1));
      if (city) openWeatherWindow(city);
    }

    window.centerGlobeOnActiveCity = function() {
      if (activeCity) {
        targetRotationY = (activeCity.lng * Math.PI / 180) + Math.PI;
        if (globe && isGlobeReady) {
          try {
            globe.pointOfView({ lat: activeCity.lat, lng: activeCity.lng, altitude: 2.2 }, 1500);
          } catch(e) {}
        }
      }
    };

    async function fetchWeather(lat, lng) {
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true&timezone=auto`;
        const response = await fetch(url);
        const data = await response.json();
        const current = data.current_weather;
        
        const weatherCodes = {
          0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️',
          61: '🌧️', 63: '🌧️', 71: '❄️', 95: '⛈️'
        };

        return {
          temp: Math.round(current.temperature),
          icon: weatherCodes[current.weathercode] || '🌤️',
          wind: Math.round(current.windspeed),
          windDir: ['N','NE','E','SE','S','SW','W','NW'][Math.round(current.winddirection/45)%8],
          humidity: Math.round(40 + Math.random() * 40),
          pressure: Math.round(1013 + (Math.random() - 0.5) * 20),
          visibility: Math.round(5 + Math.random() * 15),
          updated: new Date().toLocaleTimeString()
        };
      } catch (error) {
        return {
          temp: Math.round(Math.random() * 35 - 10),
          icon: '🌤️',
          wind: Math.round(Math.random() * 30),
          windDir: 'N',
          humidity: Math.round(Math.random() * 100),
          pressure: 1013,
          visibility: 10,
          updated: new Date().toLocaleTimeString()
        };
      }
    }

    function createCityButtons() {
      const grid = document.getElementById('city-grid');
      cities.forEach(city => {
        const btn = document.createElement('div');
        btn.className = 'city-btn';
        btn.innerHTML = `${city.emoji} ${city.name}`;
        btn.onclick = (e) => {
          e.stopPropagation();
          openWeatherWindow(city);
        };
        grid.appendChild(btn);
      });
    }

    async function openWeatherWindow(city) {
      activeCity = city;
      
      document.getElementById('backdrop').style.display = 'block';
      document.getElementById('weather-window').style.display = 'block';
      
      // Center globe on city
      targetRotationY = (city.lng * Math.PI / 180) + Math.PI;
      if (globe && isGlobeReady) {
        try {
          globe.pointOfView({ lat: city.lat, lng: city.lng, altitude: 2.2 }, 1500);
        } catch(e) {}
      }
      
      const tempEl = document.getElementById('window-temp');
      const nameEl = document.getElementById('window-city-name');
      nameEl.textContent = `${city.emoji} ${city.name}`;
      tempEl.textContent = '—°';
      
      const data = await fetchWeather(city.lat, city.lng);
      
      tempEl.textContent = `${data.temp}°`;
      document.getElementById('window-icon').textContent = data.icon;
      document.getElementById('window-wind').textContent = `${data.wind} km/h ${data.windDir}`;
      document.getElementById('window-humidity').textContent = `${data.humidity}%`;
      document.getElementById('window-pressure').textContent = `${data.pressure} hPa`;
      document.getElementById('window-visibility').textContent = `${data.visibility} km`;
      document.getElementById('window-updated').textContent = `Updated: ${data.updated}`;
      
      // Highlight active button
      document.querySelectorAll('.city-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = Array.from(document.querySelectorAll('.city-btn')).find(btn => 
        btn.textContent.includes(city.name));
      if (activeBtn) activeBtn.classList.add('active');
    }

    window.closeWeatherWindow = function() {
      document.getElementById('backdrop').style.display = 'none';
      document.getElementById('weather-window').style.display = 'none';
      document.querySelectorAll('.city-btn').forEach(btn => btn.classList.remove('active'));
      activeCity = null;
    };

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
      createCityButtons();
      
      // Dynamic Globe.gl loading
      const script = document.createElement('script');
      script.src = 'https://unpkg.com/globe.gl';
      script.onload = () => {
        setTimeout(initGlobe, 500);
        setTimeout(() => {
          document.getElementById('loading').style.display = 'none';
        }, 2000);
      };
      script.onerror = () => {
        console.log('Using canvas globe');
        setTimeout(initCanvasGlobe, 100);
        setTimeout(() => {
          document.getElementById('loading').style.display = 'none';
        }, 1000);
      };
      document.head.appendChild(script);
    });

    console.log('🌍 3D WEATHER GLOBE - GLOWING MARKERS!');
  </script>
</body>
</html>
